name: Silk Build Publish

on:
  push:
    branches: [ "main" ]
    paths:
      - 'HKViz.Silk/**'
      - 'HKViz.Shared/**'
      - 'HKViz.sln'
      - 'scripts/build-silk.sh'
      - '.github/workflows/silk-build-publish.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'HKViz.Silk/**'
      - 'HKViz.Shared/**'
      - 'HKViz.sln'
      - 'scripts/build-silk.sh'
      - '.github/workflows/silk-build-publish.yml'
  workflow_dispatch:
    inputs:
      force_thunderstore:
        description: Force re-publishing to Thunderstore
        required: true
        default: false
        type: boolean
      force_nuget:
        description: Force re-publishing to NuGet
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

defaults:
  run:
    working-directory: HKViz.Silk/HKViz.Silk

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      attestation-url: ${{ steps.attest.outputs.attestation-url }}
      allow-release: 'false'
      is-new-version: ${{ !fromJSON(steps.needs-release.outputs.exists || 'true') }}
      thunderstore-artifact-id: ${{ steps.thunderstore-artifact.outputs.artifact-id }}
      nuget-artifact-id: ${{ steps.nuget-artifact.outputs.artifact-id }}

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
    - name: Build
      run: dotnet build -c Release --verbosity normal
    - name: Pack
      run: dotnet pack -o nuget/
    - name: Get Version
      id: version
      run: |-
        VERSION=$(dotnet build HKViz.Silk.csproj -getProperty:Version)
        echo Version is $VERSION
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Upload thunderstore artifact
      id: thunderstore-artifact
      uses: actions/upload-artifact@v7
      with:
        path: HKViz.Silk/HKViz.Silk/thunderstore/dist/*.zip
        archive: false
    - name: Upload nuget artifact
      id: nuget-artifact
      uses: actions/upload-artifact@v7
      with:
        path: HKViz.Silk/HKViz.Silk/nuget/*.nupkg
        archive: false
    - name: Check if release needed
      id: needs-release
      uses: mukunku/tag-exists-action@v1.7.0
      if: github.event_name == 'push'
      with:
        tag: silk-v${{ steps.version.outputs.version }}
    - name: Generate attestation
      id: attest
      uses: actions/attest@v4
      if: github.event_name == 'push' && steps.needs-release.outputs.exists == 'false'
      with:
        subject-path: |
          HKViz.Silk/HKViz.Silk/thunderstore/dist/*.zip
          HKViz.Silk/HKViz.Silk/nuget/*.nupkg

  release-thunderstore:
    needs:
      - build
      - secret-check
    runs-on: ubuntu-latest
    if: |
      needs.secret-check.outputs.has-thunderstore-secret == 'true' &&
      (
        (
          github.event_name == 'push' &&
          needs.build.outputs.allow-release == 'true' &&
          needs.build.outputs.is-new-version == 'true'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.force_thunderstore == 'true'
        )
      )
    env:
      THUNDERSTORE_API_KEY: ${{ secrets.THUNDERSTORE_API_KEY }}

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.x
    - name: Restore tools
      run: dotnet tool restore
    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.build.outputs.thunderstore-artifact-id }}
        path: HKViz.Silk/HKViz.Silk/thunderstore/dist
        skip-decompress: true
    - name: Publish to Thunderstore
      run: |-
        dotnet tcli publish \
          --config-path thunderstore/thunderstore.toml \
          --file thunderstore/dist/*.zip \
          --token $THUNDERSTORE_API_KEY

  release-nuget:
    needs:
      - build
      - secret-check
    runs-on: ubuntu-latest
    if: |
      needs.secret-check.outputs.has-nuget-secret == 'true' &&
      (
        (
          github.event_name == 'push' &&
          needs.build.outputs.allow-release == 'true' &&
          needs.build.outputs.is-new-version == 'true'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.force_nuget == 'true'
        )
      )
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.x
    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.build.outputs.nuget-artifact-id }}
        path: HKViz.Silk/HKViz.Silk/nuget/
    - name: Publish to NuGet
      run: |-
        dotnet nuget push nuget/*.nupkg \
          --api-key $NUGET_API_KEY \
          --source https://api.nuget.org/v3/index.json

  release-github:
    needs:
      - build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.build.outputs.allow-release == 'true' && needs.build.outputs.is-new-version == 'true'

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.build.outputs.thunderstore-artifact-id }}
        path: HKViz.Silk/HKViz.Silk/thunderstore/dist
        skip-decompress: true
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        generate_release_notes: true
        fail_on_unmatched_files: true
        tag_name: silk-v${{ needs.build.outputs.version }}
        body: |
          Build attested at ${{ needs.build.outputs.attestation-url }}
        files: |
          HKViz.Silk/HKViz.Silk/thunderstore/dist/*.zip

  secret-check:
    runs-on: ubuntu-latest
    outputs:
      has-nuget-secret: ${{ secrets.NUGET_API_KEY != '' }}
      has-thunderstore-secret: ${{ secrets.THUNDERSTORE_API_KEY != '' }}
    steps:
      - run: echo no-op

